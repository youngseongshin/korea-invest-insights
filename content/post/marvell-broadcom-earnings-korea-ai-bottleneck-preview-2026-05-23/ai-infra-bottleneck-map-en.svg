<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">AI infrastructure bottleneck map</title>
  <desc id="desc">A non-technical map explaining that an AI server is a system made of GPUs, custom ASICs, HBM, Ethernet, optical links, packaging, power integrity and testing</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6fbff"/>
      <stop offset="100%" stop-color="#eef6ff"/>
    </linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f2f6b"/>
      <stop offset="100%" stop-color="#087c89"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0b2a55" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2466b1"/>
    </marker>
    <style>
      .font { font-family: "Inter", "Helvetica Neue", Arial, sans-serif; }
      .title { font-size: 54px; font-weight: 800; fill: #0b2457; letter-spacing: 0; }
      .subtitle { font-size: 26px; font-weight: 650; fill: #32547b; letter-spacing: 0; }
      .formula { font-size: 30px; font-weight: 800; fill: #ffffff; letter-spacing: 0; }
      .section-title { font-size: 30px; font-weight: 800; fill: #0b2457; letter-spacing: 0; }
      .label { font-size: 24px; font-weight: 800; fill: #10284d; letter-spacing: 0; }
      .small { font-size: 19px; font-weight: 600; fill: #4b6280; letter-spacing: 0; }
      .tiny { font-size: 16px; font-weight: 600; fill: #5d7088; letter-spacing: 0; }
      .white { fill: #ffffff; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1430" cy="120" r="210" fill="#d8efff" opacity="0.55"/>
  <circle cx="170" cy="830" r="260" fill="#dcecff" opacity="0.45"/>

  <text x="80" y="86" class="font title">An AI server is not just one GPU</text>
  <text x="82" y="128" class="font subtitle">It is a system of compute, memory, links, packaging, power stability and testing.</text>

  <rect x="80" y="154" width="1440" height="96" rx="22" fill="url(#header)" filter="url(#shadow)"/>
  <text x="114" y="195" class="font formula">AI = GPU + Custom ASIC + HBM + Ethernet + Optical Links</text>
  <text x="114" y="226" class="font formula">+ Packaging + Power Stability + Testing</text>

  <rect x="80" y="282" width="1440" height="442" rx="28" fill="#ffffff" stroke="#c9dcf2" stroke-width="2" filter="url(#shadow)"/>

  <g transform="translate(110 318)">
    <rect width="320" height="356" rx="24" fill="#eef6ff" stroke="#9ac3ee" stroke-width="2"/>
    <text x="26" y="48" class="font section-title">1. Compute Engine</text>
    <text x="28" y="80" class="font small">Does the AI math</text>
    <rect x="36" y="112" width="248" height="82" rx="18" fill="#ffffff" stroke="#7fb2e8" stroke-width="2"/>
    <rect x="62" y="135" width="52" height="38" rx="8" fill="#1d5fae"/>
    <line x1="54" y1="145" x2="34" y2="145" stroke="#1d5fae" stroke-width="5"/>
    <line x1="54" y1="162" x2="34" y2="162" stroke="#1d5fae" stroke-width="5"/>
    <line x1="122" y1="145" x2="142" y2="145" stroke="#1d5fae" stroke-width="5"/>
    <line x1="122" y1="162" x2="142" y2="162" stroke="#1d5fae" stroke-width="5"/>
    <text x="158" y="146" class="font label">GPU</text>
    <text x="158" y="174" class="font tiny">general engine</text>
    <rect x="36" y="216" width="248" height="82" rx="18" fill="#ffffff" stroke="#7fb2e8" stroke-width="2"/>
    <rect x="62" y="237" width="52" height="42" rx="10" fill="#0e8b91"/>
    <path d="M73 251 h30 M73 264 h30" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
    <text x="158" y="250" class="font label">ASIC</text>
    <text x="158" y="278" class="font tiny">job-specific engine</text>
    <text x="34" y="326" class="font tiny">Question: who computes</text>
    <text x="34" y="350" class="font tiny">faster and cheaper?</text>
  </g>

  <path d="M447 500 H498" stroke="#2466b1" stroke-width="5" marker-end="url(#arrow)" opacity="0.75"/>

  <g transform="translate(510 318)">
    <rect width="320" height="356" rx="24" fill="#ecfbf9" stroke="#8fd6cf" stroke-width="2"/>
    <text x="26" y="48" class="font section-title">2. Fast Memory</text>
    <text x="28" y="80" class="font small">Keeps data close to compute</text>
    <rect x="36" y="112" width="248" height="82" rx="18" fill="#ffffff" stroke="#78cfc6" stroke-width="2"/>
    <g transform="translate(62 130)">
      <rect x="0" y="22" width="58" height="22" rx="6" fill="#0b8f83"/>
      <rect x="7" y="12" width="58" height="22" rx="6" fill="#18afa2"/>
      <rect x="14" y="2" width="58" height="22" rx="6" fill="#42c7bc"/>
    </g>
    <text x="154" y="146" class="font label">HBM</text>
    <text x="154" y="174" class="font tiny">fast workbench</text>
    <rect x="36" y="216" width="248" height="82" rx="18" fill="#ffffff" stroke="#78cfc6" stroke-width="2"/>
    <rect x="62" y="236" width="72" height="44" rx="10" fill="#187f91"/>
    <path d="M72 248 h52 M72 260 h52 M72 272 h52" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
    <text x="154" y="250" class="font label">DRAM</text>
    <text x="154" y="278" class="font tiny">temporary storage</text>
    <text x="34" y="326" class="font tiny">Question: is enough data</text>
    <text x="34" y="350" class="font tiny">close to the chip?</text>
  </g>

  <path d="M847 500 H898" stroke="#2466b1" stroke-width="5" marker-end="url(#arrow)" opacity="0.75"/>

  <g transform="translate(910 318)">
    <rect width="320" height="356" rx="24" fill="#eefcff" stroke="#8ed6e6" stroke-width="2"/>
    <text x="26" y="48" class="font section-title">3. Data Roads</text>
    <text x="28" y="80" class="font small">Connect chips, racks and clusters</text>
    <rect x="36" y="112" width="248" height="82" rx="18" fill="#ffffff" stroke="#7bcfe2" stroke-width="2"/>
    <circle cx="72" cy="153" r="15" fill="#0f6ab7"/>
    <circle cx="122" cy="133" r="15" fill="#0f6ab7"/>
    <circle cx="122" cy="173" r="15" fill="#0f6ab7"/>
    <path d="M86 149 L108 137 M86 158 L108 169" stroke="#0f6ab7" stroke-width="6" stroke-linecap="round"/>
    <text x="154" y="146" class="font label">Ethernet</text>
    <text x="154" y="174" class="font tiny">switch roads</text>
    <rect x="36" y="216" width="248" height="82" rx="18" fill="#ffffff" stroke="#7bcfe2" stroke-width="2"/>
    <path d="M62 258 C85 232, 110 284, 134 258" fill="none" stroke="#0c8aa8" stroke-width="8" stroke-linecap="round"/>
    <circle cx="62" cy="258" r="9" fill="#0c8aa8"/>
    <circle cx="134" cy="258" r="9" fill="#0c8aa8"/>
    <text x="154" y="250" class="font label">Optical</text>
    <text x="154" y="278" class="font tiny">long-distance roads</text>
    <text x="34" y="326" class="font tiny">Question: can data move</text>
    <text x="34" y="350" class="font tiny">without bottlenecks?</text>
  </g>

  <path d="M1247 500 H1268" stroke="#2466b1" stroke-width="5" marker-end="url(#arrow)" opacity="0.75"/>

  <g transform="translate(1280 318)">
    <rect width="220" height="356" rx="24" fill="#f5f1ff" stroke="#c2adef" stroke-width="2"/>
    <text x="24" y="48" class="font section-title">4. Base</text>
    <text x="24" y="80" class="font small">Makes it run reliably</text>
    <rect x="36" y="108" width="148" height="54" rx="16" fill="#ffffff" stroke="#b39be8" stroke-width="2"/>
    <text x="42" y="143" class="font label">Packaging</text>
    <rect x="36" y="181" width="148" height="54" rx="16" fill="#ffffff" stroke="#b39be8" stroke-width="2"/>
    <text x="72" y="215" class="font label">Power</text>
    <rect x="36" y="254" width="148" height="54" rx="16" fill="#ffffff" stroke="#b39be8" stroke-width="2"/>
    <text x="70" y="289" class="font label">Testing</text>
    <text x="26" y="340" class="font tiny">body, electricity, QA</text>
  </g>

  <rect x="80" y="760" width="1440" height="92" rx="24" fill="#0b2457"/>
  <text x="122" y="800" class="font formula">Investor takeaway</text>
  <text x="122" y="834" class="font subtitle white">Do not stop at HBM. Check links, substrates, power stability and testing bottlenecks.</text>
  <text x="1180" y="834" class="font small white">Marvell and Broadcom preview</text>
</svg>
