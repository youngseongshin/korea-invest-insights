name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.159.2
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb \
            https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb
          sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Build with Hugo
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          HUGO_ENVIRONMENT: production
          HUGO_ADSENSE_PUBLISHER_ID: ${{ secrets.GOOGLE_ADSENSE_PUBLISHER_ID }}
          HUGO_RECOMMENDATIONS_API: ${{ secrets.HUGO_RECOMMENDATIONS_API }}
          TZ: Asia/Seoul
        run: hugo --minify

      - name: Configure ads.txt
        env:
          GOOGLE_ADSENSE_PUBLISHER_ID: ${{ secrets.GOOGLE_ADSENSE_PUBLISHER_ID }}
        run: |
          if [ -n "$GOOGLE_ADSENSE_PUBLISHER_ID" ]; then
            ADSENSE_SELLER_ID="${GOOGLE_ADSENSE_PUBLISHER_ID#ca-}"
            printf 'google.com, %s, DIRECT, f08c47fec0942fa0\n' "$ADSENSE_SELLER_ID" > public/ads.txt
          fi

      - name: QA — block AI-leftover meta-commentary
        run: |
          set -e
          # Patterns that should NEVER appear in published HTML.
          # These indicate the translation pipeline leaked LLM scratchpad output.
          # `frontmatter` alone is too generic so it is excluded; we use stricter phrases.
          patterns=(
            "The translation is ready"
            "Here'?s a summary of the key"
            "Here is a summary of the key"
            "Please approve the file write"
            "approve the file write when prompted"
            "key localization decisions"
            "summary of the key localization"
            "Translation complete[.,]"
            "Here is the translated"
            "I have translated"
            "I'?ll translate this"
            "I will translate this"
          )
          fail=0
          for pattern in "${patterns[@]}"; do
            if grep -RniE "$pattern" public/ --include='*.html' 2>/dev/null; then
              echo "::error::QA failed — forbidden pattern in published HTML: $pattern"
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then
            echo "::error::Build is blocked. Inspect content/post/*/index.*.md for raw LLM scratchpad output and re-run the translation."
            exit 1
          fi
          echo "QA passed — no AI-leftover meta-commentary in published HTML."

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  valley-publish:
    runs-on: ubuntu-latest
    needs: deploy
    if: ${{ github.event_name == 'push' && github.run_attempt == 1 && vars.VALLEY_AUTO_PUBLISH == 'true' }}
    env:
      VALLEY_AUTO_PUBLISH: ${{ vars.VALLEY_AUTO_PUBLISH }}
      VALLEY_API_TOKEN: ${{ secrets.VALLEY_API_TOKEN }}
      VALLEY_POST_CATEGORY_ID: ${{ secrets.VALLEY_POST_CATEGORY_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Publish newly added Korean posts to Valley Space
        run: |
          set -euo pipefail

          if [ "${VALLEY_AUTO_PUBLISH:-}" != "true" ]; then
            echo "Valley auto-publish skipped: set repository variable VALLEY_AUTO_PUBLISH=true to enable."
            exit 0
          fi

          if [ -z "${VALLEY_API_TOKEN:-}" ]; then
            echo "::warning::Valley auto-publish skipped: VALLEY_API_TOKEN secret is missing."
            exit 0
          fi

          if [ -z "${VALLEY_POST_CATEGORY_ID:-}" ]; then
            echo "::warning::Valley auto-publish skipped: VALLEY_POST_CATEGORY_ID secret is missing."
            exit 0
          fi

          before="${{ github.event.before }}"
          sha="${{ github.sha }}"

          if [ -z "$before" ] || [[ "$before" =~ ^0+$ ]]; then
            before="$(git rev-parse "${sha}^" 2>/dev/null || true)"
          fi

          if [ -z "$before" ]; then
            echo "Valley auto-publish skipped: unable to determine previous commit."
            exit 0
          fi

          mapfile -t posts < <(
            git diff --name-status "$before" "$sha" -- 'content/post/*/index.ko.md' \
              | awk '$1 == "A" { print $2 }'
          )

          if [ "${#posts[@]}" -eq 0 ]; then
            echo "Valley auto-publish skipped: no newly added Korean posts in this push."
            exit 0
          fi

          for post in "${posts[@]}"; do
            echo "Publishing to Valley: $post"
            scripts/valley_crosspost.py \
              --post "$post" \
              --mode publish \
              --body-mode auto \
              --category-id "$VALLEY_POST_CATEGORY_ID" \
              --confirm-publish
          done
