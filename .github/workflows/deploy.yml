name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.159.2
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb \
            https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb
          sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Build with Hugo
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          HUGO_ENVIRONMENT: production
          TZ: Asia/Seoul
        run: hugo --minify

      - name: QA — block AI-leftover meta-commentary
        run: |
          set -e
          # Patterns that should NEVER appear in published HTML.
          # These indicate the translation pipeline leaked LLM scratchpad output.
          # `frontmatter` alone is too generic so it is excluded; we use stricter phrases.
          patterns=(
            "The translation is ready"
            "Here'?s a summary of the key"
            "Here is a summary of the key"
            "Please approve the file write"
            "approve the file write when prompted"
            "key localization decisions"
            "summary of the key localization"
            "Translation complete[.,]"
            "Here is the translated"
            "I have translated"
            "I'?ll translate this"
            "I will translate this"
          )
          fail=0
          for pattern in "${patterns[@]}"; do
            if grep -RniE "$pattern" public/ --include='*.html' 2>/dev/null; then
              echo "::error::QA failed — forbidden pattern in published HTML: $pattern"
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then
            echo "::error::Build is blocked. Inspect content/post/*/index.*.md for raw LLM scratchpad output and re-run the translation."
            exit 1
          fi
          echo "QA passed — no AI-leftover meta-commentary in published HTML."

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
