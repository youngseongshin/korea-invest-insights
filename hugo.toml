baseURL = "https://youngseongshin.github.io/korea-invest-insights/"
title = "Korea Invest Insights"
theme = "hugo-theme-stack"
defaultContentLanguage = "es"
hasCJKLanguage = true
enableRobotsTXT = true
enableGitInfo = true

[sitemap]
  changefreq = "daily"
  priority = 0.7

[pagination]
  pagerSize = 10

[params]
  mainSections = ["post"]
  description = "Korean market insights from a professional investor & VC perspective"
  keywords = ["Korea stock market", "Korean investment", "KOSPI", "Korean VC", "semiconductor", "K-market analysis"]
  substack_subdomain = "youngseongshin"
  [params.sidebar]
    emoji = "🇰🇷"
    subtitle = "Korean Market Intelligence"
  [params.footer]
    since = 2026
  [params.dateFormat]
    published = "2006-01-02"
    lastUpdated = "2006-01-02 15:04 MST"
  [params.article]
    math = false
    toc = true
    readingTime = true
  [params.comments]
    enabled = true
    provider = "giscus"
  [params.comments.giscus]
    repo = "youngseongshin/korea-invest-insights"
    repoId = "R_kgDOR5Ynbw"
    category = "General"
    categoryId = "DIC_kwDOR5Ynb84C6CPT"
    mapping = "pathname"
    reactionsEnabled = "1"
    emitMetadata = "0"
    inputPosition = "top"
    lightTheme = "light"
    darkTheme = "dark_dimmed"
    lazyLoading = true

