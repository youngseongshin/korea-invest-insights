baseURL = "https://youngseongshin.github.io/korea-invest-insights/"
title = "Korea Invest Insights"
theme = "hugo-theme-stack"
defaultContentLanguage = "es"
hasCJKLanguage = true
enableRobotsTXT = true
[pagination]
  pagerSize = 10

[params]
  mainSections = ["post"]
  description = "Korean market insights from a professional investor & VC perspective"
  [params.sidebar]
    emoji = "🇰🇷"
    subtitle = "Korean Market Intelligence"
  [params.footer]
    since = 2026
  [params.dateFormat]
    published = "2006-01-02"
    lastUpdated = "2006-01-02 15:04 MST"
  [params.article]
    math = false
    toc = true
    readingTime = true

